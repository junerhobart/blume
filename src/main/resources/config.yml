resource-pack:
  enabled: true
  url: ""
  builtin-host: false
  host: ""
  port: 8765
  required: true
  prompt: "<green>Blume</green> uses a resource pack for custom items. Please accept to see them in-game."
  bedrock:
    enabled: true

updates:
  check: true
  github-repo: "junerhobart/blume"

admin:
  graylist:
    enabled: true
    join-message:
      enabled: true
      text: "<yellow>You are graylisted.</yellow> A verified member must vouch for you before you can interact with the world. They can run <white>/vouch {username}</white>."
  command-broadcast:
    enabled: true
    format: "<white>{player}</white>: <yellow>{command}</yellow>"
    commands:
      - gamemode
      - gm
      - give
      - clear
      - item
      - tp
      - teleport
      - effect
      - enchant
      - experience
      - xp
      - fill
      - setblock
      - clone
      - summon
      - kill
      - ride
      - damage
      - time
      - weather
      - difficulty
      - gamerule
      - defaultgamemode
      - spawnpoint
      - setworldspawn
      - spreadplayers
      - worldborder
      - data
      - attribute
      - loot
      - seed
      - locate
      - fly
      - god
      - heal
      - feed
      - speed
      - invsee
      - ecsee
      - eecsee
      - endersee
      - openinv
      - openender
      - vanish
      - v
      - socialspy
      - tphere
      - gms
      - gmc
      - gma
      - gmsp
      - spectate
      - spec
      - worldedit
      - we
      - wand
      - brush
      - br
      - tool
      - schematic
      - schem
      - stack
      - undo
      - redo
  luckperms:
    # luckperms hook — adds vouched players to a group. needs LuckPerms installed.
    # setup: /lp creategroup verified, set verified-group below, then enabled: true
    enabled: false
    verified-group: ""

qol:
  double-doors:
    enabled: true
  creeper-rebuild:
    enabled: true
    rebuild-delay-ms: 2000
    rebuild-delay-falloff: 0.175
    rebuild-min-delay-ms: 50
    rebuild-wither: true
  desire-paths:
    enabled: true
    walks-to-trample: 4
    walks-to-worn: 8
    walks-to-path: 12
    erosion:
      enabled: true
      timeout-mc-days:
        trampled: 5
        worn: 8
    worn-weights:
      dirt: 75
      coarse_dirt: 20
      gravel: 5
  death-drops:
    enabled: true
    lifetime-minutes: 240
  anvil:
    enabled: true
    max-repair-cost: 2147483647
  harvest-replant:
    enabled: true
    require-empty-hand: false
  path-speed:
    enabled: true
    speed-1-blocks:
      - DIRT
      - COARSE_DIRT
      - GRAVEL
    speed-2-blocks:
      - DIRT_PATH

enchants:
  enabled: true
  auto-smelt:
    enabled: true
  veinminer:
    enabled: true
    # -1 = unlimited (not recommended; one break processes the whole vein synchronously)
    max-blocks: 64
  timber:
    enabled: true
    # -1 = unlimited (not recommended)
    max-blocks: 256
    replant-saplings: true
  sickle:
    enabled: true
    radius-by-level: [1, 2, 3]
  unbreakable:
    enabled: true

ecology:
  enabled: true
  potato-seeds:
    poison-whole-crop-chance: 0.60
  mixed-seeds:
    grass-chance: 0.65
    crop-chance: 0.35
    drop-min: 0
    drop-max: 2
  wild-crops:
    enabled: true
    biome-filter: false
    max-per-chunk: 16
    spawn-chance: 0.35
    patches-per-chunk: 3
    spread-enabled: true
    spread-chance: 0.05
    spread-into-grass-chance: 0.02
    biome-allowlist:
      - plains
      - forest
      - meadow
      - savanna
      - taiga
      - jungle
      - swamp
      - river
  natural-grass:
    enabled: true
    short-grass-chance: 0.05
    tall-grass-chance: 0.03
    invade-farmland: false
    invade-farmland-chance: 0.08
  pollination:
    # Crop boosts never clear bee nectar; vanilla hive deposit handles honey.
    enabled: true
    flower-spread-chance: 0.05
  husbandry:
    enabled: true
    max-pasture-radius: 48
    min-blocks-per-animal:
      cow: 64
      sheep: 48
      pig: 40
      chicken: 12
    tier-multipliers:
      good: 1.5
      fair: 2.5
    water-boost: true
    sunlight-boost-enabled: true
    sunlight-boost-threshold: 0.60
    standing-no-sky-penalty: true
    sunlight-yield-bonus: 0.10
    shelter-required-max-radius: 24
    flooring:
      good-blocks:
        - GRASS_BLOCK
        - MOSS_BLOCK
        - MOSS_CARPET
        - PODZOL
        - DIRT
        - COARSE_DIRT
        - ROOTED_DIRT
        - GRAVEL
        - CLAY
        - MUD
        - SAND
      bad-blocks:
        - HOPPER
        - DROPPER
        - DISPENSER
        - MAGMA_BLOCK
        - CAMPFIRE
        - SOUL_CAMPFIRE
        - CACTUS
        - SWEET_BERRY_BUSH
        - WITHER_ROSE
        - LAVA
      good-boost-threshold: 0.60
      bad-penalty-threshold: 0.15
      standing-bad-forces-poor: true
    bonuses:
      excellent:
        wool-drop-multiplier: 2.0
        egg-bonus-guaranteed: true
        breed-twin-chance: 0.25
        baby-growth-multiplier: 2.0
        wool-regrow-multiplier: 0.5
        love-mode-multiplier: 0.5
        kill-bonus-roll: 1.0
      good:
        wool-drop-multiplier: 1.5
        egg-bonus-chance: 0.50
        breed-twin-chance: 0.15
        baby-growth-multiplier: 1.5
        kill-bonus-chance: 0.50
      fair:
        egg-bonus-chance: 0.25
        baby-growth-multiplier: 1.25
      poor:
        egg-lay-cancel-chance: 0.50
        wool-penalty-min: 1
        wool-regrow-multiplier: 1.5
        baby-growth-multiplier: 0.75
        love-mode-multiplier: 1.5
        kill-penalty-roll: 1
