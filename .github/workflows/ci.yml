name: CI

on:
  pull_request:
    branches: [main]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.versions.outputs.matrix }}
      latest: ${{ steps.versions.outputs.latest }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Revision
        id: revision
        run: echo "revision=$(git describe --tags --always | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - name: MC version from pom
        id: versions
        run: |
          latest=$(mvn -q -Drevision=${{ steps.revision.outputs.revision }} help:evaluate -Dexpression=minecraft.version -DforceStdout)
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"
          echo "matrix=[\"${latest}\"]" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        minecraft_version: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Revision
        id: revision
        run: echo "revision=$(git describe --tags --always | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - name: Build plugin
        run: mvn -B -Drevision=${{ steps.revision.outputs.revision }} package -DskipTests -Dminecraft.version=${{ matrix.minecraft_version }}

      - name: Artifact contract
        run: |
          set -eu
          version=$(mvn -q -Drevision=${{ steps.revision.outputs.revision }} help:evaluate -Dexpression=project.version -DforceStdout)
          jar="target/Blume-${version}.jar"

          test -f "$jar"
          test -f target/blume-pack.zip
          test -f target/blume-bedrock-pack.zip
          test -f target/blume-geyser-mappings.json

          jar tf "$jar" | grep -q 'java-pack.zip'
          jar tf "$jar" | grep -q 'bedrock-pack.zip'
          jar tf "$jar" | grep -q 'blume-geyser-mappings.json'
          jar tf "$jar" | grep -q 'blume_datapack/pack.mcmeta'
          jar tf "$jar" | grep -q 'paper-plugin.yml'

          unzip -l target/blume-pack.zip | grep -q 'pack.mcmeta'
          unzip -l target/blume-pack.zip | grep -q 'carrot_seeds'

          jq . resourcepack/bedrock/geyser_items.json >/dev/null
          for f in src/main/resources/blume_datapack/data/blume/loot_table/item/*.json; do
            jq . "$f" >/dev/null
          done

      - uses: actions/upload-artifact@v4
        with:
          name: blume-jar-${{ matrix.minecraft_version }}
          path: target/Blume-*.jar
          retention-days: 1

  website:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Assemble docs site
        run: |
          rm -rf target/docs-site && mkdir -p target/docs-site
          cp -R docs/. target/docs-site/
          cp -R resourcepack target/docs-site/resourcepack

      - name: Docs static checks
        run: |
          set -eu
          site=target/docs-site
          test -f "$site/index.html"
          test -f "$site/css/style.css"
          test -f "$site/js/site.js"
          test -f "$site/js/accordion.js"
          test -f resourcepack/java/pack.png
          test -f docs/favicon.ico

          jq -e 'length > 0' docs/features/categories.json >/dev/null

          jq -r '.[] | "\(.id) \(.banner) \(.features[])"' docs/features/categories.json | while read -r cat banner slug; do
            test -f "docs/features/${cat}/${slug}.md"
            grep -q "bg-block-${banner}" docs/css/style.css

            icon=$(awk '/^---$/{n++; next} n==1 && /^icon:/{sub(/^icon:[[:space:]]*/,""); gsub(/["'\'']/, ""); print; exit}' "docs/features/${cat}/${slug}.md")
            case "$icon" in
              minecraft:*)
                test -f "docs/assets/minecraft/textures/item/${icon#minecraft:}.png"
                ;;
              blume:*)
                test -f "resourcepack/java/assets/blume/textures/item/${icon#blume:}.png"
                ;;
              *)
                echo "missing or unknown icon in ${cat}/${slug}.md: ${icon}"
                exit 1
                ;;
            esac
          done

      - name: Docs HTTP smoke
        run: |
          set -eu
          python3 -m http.server 4173 --directory target/docs-site &
          web_pid=$!
          trap 'kill "$web_pid" 2>/dev/null || true' EXIT
          sleep 1

          curl -fsS http://127.0.0.1:4173/ | grep -q 'id="features"'
          curl -fsS http://127.0.0.1:4173/css/style.css >/dev/null
          curl -fsS http://127.0.0.1:4173/js/site.js >/dev/null
          curl -fsS http://127.0.0.1:4173/features/categories.json >/dev/null

          jq -r '.[] | "\(.id) \(.features[])"' docs/features/categories.json | while read -r cat slug; do
            curl -fsS "http://127.0.0.1:4173/features/${cat}/${slug}.md" >/dev/null
          done

  smoke:
    needs: [setup, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        minecraft_version: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: blume-jar-${{ matrix.minecraft_version }}
          path: jar

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Plugin load smoke
        run: |
          set -eu
          root="$PWD"
          work="$root/.ci-work"
          rm -rf "$work"
          mkdir -p "$work/plugins/Blume"

          mc='${{ matrix.minecraft_version }}'
          paper_url=$(curl -fsSL "https://fill.papermc.io/v3/projects/paper/versions/${mc}/builds" \
            | jq -r 'sort_by(.downloads["server:default"].url | capture("-(?<n>[0-9]+)\\.jar$").n | tonumber) | last | .downloads["server:default"].url')
          curl -fsSL -o "$work/paper.jar" "$paper_url"

          cp jar/Blume-*.jar "$work/plugins/Blume.jar"

          unzip -p "$work/plugins/Blume.jar" config.yml > "$work/plugins/Blume/config.yml"
          sed -i 's/^  builtin-host:.*/  builtin-host: true/' "$work/plugins/Blume/config.yml"
          sed -i 's/^  check:.*/  check: false/' "$work/plugins/Blume/config.yml"
          sed -i 's/^  host:.*/  host: "127.0.0.1"/' "$work/plugins/Blume/config.yml"

          printf '%s\n' 'eula=true' > "$work/eula.txt"
          printf '%s\n' \
            'online-mode=false' \
            'spawn-protection=0' \
            'server-port=25566' \
            > "$work/server.properties"

          cd "$work"
          java -Xms512M -Xmx1G -jar paper.jar --nogui > console.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          for _ in $(seq 1 60); do
            if grep -q 'Done (' console.log 2>/dev/null; then
              break
            fi
            sleep 2
          done

          grep -q 'Done (' console.log
          grep -qi 'blume' console.log
          ! grep -E 'SEVERE.*Blume|Could not load.*Blume|Error occurred while enabling Blume' console.log \
            || { grep -E 'SEVERE.*Blume|Could not load.*Blume|Error occurred while enabling Blume' console.log; exit 1; }

          curl -fsS http://127.0.0.1:8765/blume-pack.zip | head -c 2 | grep -q '^PK'
