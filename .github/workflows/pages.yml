name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs/source/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build plugin and resource pack
        run: mvn -B package -DskipTests

      - name: Build docs site
        run: |
          cd docs/source
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt
          npm ci
          ./build.sh

      - name: Prepare Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp docs/index.html _site/
          cp -r docs/css docs/assets _site/
          cp docs/blume-pack.zip _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4