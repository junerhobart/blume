name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # The site is assembled from docs/ and resourcepack/ only; no Maven
      # build output is deployed, so none is built here.
      - name: Assemble docs site
        run: |
          rm -rf target/docs-site && mkdir -p target/docs-site
          cp -R docs/. target/docs-site/
          cp -R resourcepack target/docs-site/resourcepack

      - name: Docs static checks
        run: |
          set -eu
          jq -e 'length > 0' docs/features/categories.json >/dev/null
          jq -r '.[] | "\(.id) \(.features[])"' docs/features/categories.json | while read -r cat slug; do
            test -f "docs/features/${cat}/${slug}.md"
          done

      - name: Archive Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory target/docs-site \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      - uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
