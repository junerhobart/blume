name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Revision
        id: revision
        run: echo "revision=$(git describe --tags --always | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - name: Build plugin and resource packs
        run: mvn -B -Drevision=${{ steps.revision.outputs.revision }} package -DskipTests

      - name: Assemble docs site
        run: |
          rm -rf target/docs-site && mkdir -p target/docs-site
          cp -R docs/. target/docs-site/
          cp -R resourcepack target/docs-site/resourcepack

      - name: Docs static checks
        run: |
          set -eu
          jq -e 'length > 0' docs/features/categories.json >/dev/null
          jq -r '.[] | "\(.id) \(.features[])"' docs/features/categories.json | while read -r cat slug; do
            test -f "docs/features/${cat}/${slug}.md"
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/docs-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
