name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Version from tag
        id: release
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          MC=$(mvn -q help:evaluate -Dexpression=minecraft.version -DforceStdout)
          REVISION="${TAG}"
          PRERELEASE=false
          case "$TAG" in
            *-beta*) PRERELEASE=true ;;
          esac

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "revision=${REVISION}" >> "$GITHUB_OUTPUT"
          echo "minecraft_version=${MC}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: mvn -B -Drevision=${{ steps.release.outputs.revision }} -Dminecraft.version=${{ steps.release.outputs.minecraft_version }} package

      - name: Changelog since last tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            git log "${PREV_TAG}..HEAD" --format='- %s' > changelog.txt
          else
            git log --format='- %s' > changelog.txt
          fi
          printf -- '- Minecraft 1.21.x is deprecated and no longer receives Blume updates. This build requires Paper 26.2 and Java 25.\n' > changelog.txt.tmp
          cat changelog.txt >> changelog.txt.tmp && mv changelog.txt.tmp changelog.txt

      - uses: softprops/action-gh-release@v2
        with:
          name: "[${{ steps.release.outputs.minecraft_version }}] Blume v${{ steps.release.outputs.tag }}"
          body_path: changelog.txt
          generate_release_notes: false
          prerelease: ${{ steps.release.outputs.prerelease == 'true' }}
          files: |
            target/Blume-${{ steps.release.outputs.revision }}.jar
            target/blume-pack.zip
            target/blume-bedrock-pack.zip
            target/blume-geyser-mappings.json

      - name: Publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
          VERSION: ${{ steps.release.outputs.tag }}
          REVISION: ${{ steps.release.outputs.revision }}
          MC_VERSION: ${{ steps.release.outputs.minecraft_version }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        run: |
          if [ "$PRERELEASE" = true ]; then
            version_type=beta
            featured=false
          else
            version_type=release
            featured=true
          fi

          JSON=$(jq -n \
            --arg name "[${MC_VERSION}] Blume v${VERSION}" \
            --arg version_number "$VERSION" \
            --arg changelog "$(cat changelog.txt)" \
            --arg project_id "$MODRINTH_PROJECT_ID" \
            --arg mc_version "$MC_VERSION" \
            --arg version_type "$version_type" \
            --argjson featured "$featured" \
            --argjson loaders '["paper"]' \
            '{
              name: $name,
              version_number: $version_number,
              changelog: $changelog,
              dependencies: [],
              game_versions: [$mc_version],
              version_type: $version_type,
              loaders: $loaders,
              featured: $featured,
              project_id: $project_id,
              file_parts: ["jar"],
              primary_file: "jar",
              environment: "server_only"
            }')

          curl -fsSL -X POST "https://api.modrinth.com/v2/version" \
            -H "Authorization: ${MODRINTH_TOKEN}" \
            -F "data=${JSON};type=application/json" \
            -F "jar=@target/Blume-${REVISION}.jar"
