name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Version from tag
        id: release
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PINNED=$(mvn -q help:evaluate -Dexpression=minecraft.version.pinned -DforceStdout)
          LATEST=$(mvn -q help:evaluate -Dexpression=minecraft.version.latest -DforceStdout)
          SUFFIX="-${PINNED}"

          case "$TAG" in
            *"${SUFFIX}") MC="${PINNED}" ;;
            *) MC="${LATEST}" ;;
          esac
          REVISION="${TAG}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "revision=${REVISION}" >> "$GITHUB_OUTPUT"
          echo "minecraft_version=${MC}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: mvn -B -Drevision=${{ steps.release.outputs.revision }} -Dminecraft.version=${{ steps.release.outputs.minecraft_version }} package

      - name: Changelog since last tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            git log "${PREV_TAG}..HEAD" --format='- %s' > changelog.txt
          else
            git log --format='- %s' > changelog.txt
          fi

      - uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.txt
          generate_release_notes: false
          files: |
            target/Blume-${{ steps.release.outputs.revision }}.jar
            target/blume-pack.zip
            target/blume-bedrock-pack.zip
            target/blume-geyser-mappings.json

      - name: Sync README to Modrinth body
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
        run: |
          BODY_JSON=$(jq -n --rawfile body README.md '{body: $body}')
          curl -fsSL -X PATCH "https://api.modrinth.com/v2/project/${MODRINTH_PROJECT_ID}" \
            -H "Authorization: ${MODRINTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY_JSON"

      - name: Sync GitHub About to Modrinth description
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
          GH_TOKEN: ${{ github.token }}
        run: |
          SUMMARY=$(gh api "repos/${GITHUB_REPOSITORY}" --jq .description | head -c 256)
          if [ -z "$SUMMARY" ]; then
            echo "GitHub repo description is empty; set About in repo settings before syncing"
            exit 1
          fi

          curl -fsSL -X PATCH "https://api.modrinth.com/v2/project/${MODRINTH_PROJECT_ID}" \
            -H "Authorization: ${MODRINTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg d "$SUMMARY" '{description: $d}')"

      - name: Publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
          VERSION: ${{ steps.release.outputs.tag }}
          REVISION: ${{ steps.release.outputs.revision }}
          MC_VERSION: ${{ steps.release.outputs.minecraft_version }}
        run: |
          JSON=$(jq -n \
            --arg name "Blume ${VERSION}" \
            --arg version_number "$VERSION" \
            --arg changelog "$(cat changelog.txt)" \
            --arg project_id "$MODRINTH_PROJECT_ID" \
            --arg mc_version "$MC_VERSION" \
            --argjson loaders '["paper"]' \
            '{
              name: $name,
              version_number: $version_number,
              changelog: $changelog,
              dependencies: [],
              game_versions: [$mc_version],
              version_type: "release",
              loaders: $loaders,
              featured: true,
              project_id: $project_id,
              file_parts: ["jar"],
              primary_file: "jar",
              environment: "server_only"
            }')

          curl -fsSL -X POST "https://api.modrinth.com/v2/version" \
            -H "Authorization: ${MODRINTH_TOKEN}" \
            -F "data=${JSON};type=application/json" \
            -F "jar=@target/Blume-${REVISION}.jar"
