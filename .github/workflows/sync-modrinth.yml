name: Sync Modrinth metadata

on:
  push:
    branches: [main]
    paths:
      - README.md
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync README to Modrinth body
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
        run: |
          if [ ! -f README.md ]; then
            echo "README.md not found"
            exit 1
          fi

          BODY_JSON=$(jq -n --rawfile body README.md '{body: $body}')
          curl -fsSL -X PATCH "https://api.modrinth.com/v2/project/${MODRINTH_PROJECT_ID}" \
            -H "Authorization: ${MODRINTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY_JSON"

      - name: Sync GitHub About to Modrinth description
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
          GH_TOKEN: ${{ github.token }}
        run: |
          SUMMARY=$(gh api "repos/${GITHUB_REPOSITORY}" --jq .description | head -c 256)
          if [ -z "$SUMMARY" ]; then
            echo "GitHub repo description is empty; set About in repo settings before syncing"
            exit 1
          fi

          curl -fsSL -X PATCH "https://api.modrinth.com/v2/project/${MODRINTH_PROJECT_ID}" \
            -H "Authorization: ${MODRINTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg d "$SUMMARY" '{description: $d}')"
