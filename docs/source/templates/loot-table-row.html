<tr class="border-b border-[#2b2b2c] bg-black/25">
	<th scope="row" class="px-6 py-4 font-medium text-white whitespace-nowrap">
		<img class="mr-4 w-[32px] h-[32px] min-w-[32px] min-h-[32px] mctooltip is-pixelated" src="{{ loot_table.row.item.icon }}" data-mctooltip="{{ loot_table.row.item.name }}">
	</th>
	<td class="px-6 py-4">{{ loot_table.row.chance }}</td>
	<td class="px-6 py-4">{{ loot_table.row.amount }}</td>
	{{ loot_table.col.where }}
</tr>
