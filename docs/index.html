<!DOCTYPE html>
<html lang="en" class="dark bg-block-moss">
  <head>
    <title>Blume</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Blume - a nature-focused Paper plugin with ecology, quality-of-life tweaks, and custom enchantments.">
    <meta name="author" content="junerhobart">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="icon" href="resourcepack/java/pack.png" type="image/png">
  </head>
  <body class="mc-text font-minecraft">
    <main class="relative z-10 mx-auto max-w-screen-lg px-4 pb-20 pt-8">
      <section class="pb-12 text-center">
        <img class="mx-auto mb-4 is-pixelated" src="resourcepack/java/pack.png" width="96" height="96" alt="">
        <h1 class="hero-title font-minecraft text-4xl md:text-5xl font-normal tracking-wide mc-text-heading">Blume</h1>
        <p class="mt-3 text-lg mc-text-muted max-w-xl mx-auto">Vanilla-friendly ecology and quality-of-life for Paper servers.</p>
        <div class="mt-6 flex flex-wrap items-center justify-center gap-3">
          <a class="mc-interactive mc-btn-press inline-flex items-center gap-2.5 font-minecraft text-lg mc-text bg-block-dirt mc-border mc-hover px-5 py-2.5 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-white focus-visible:ring-offset-2 focus-visible:ring-offset-transparent" href="https://github.com/junerhobart/blume" rel="noopener">
            <i class="fa-brands fa-github text-4xl leading-none" aria-hidden="true"></i>
            <span class="mc-layer-content">GitHub</span>
          </a>
          <a class="mc-interactive mc-btn-press inline-flex items-center gap-2.5 font-minecraft text-lg mc-text bg-block-dirt mc-border mc-hover px-5 py-2.5 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-white focus-visible:ring-offset-2 focus-visible:ring-offset-transparent" href="https://modrinth.com/plugin/blume-" rel="noopener">
            <img class="h-8 w-8 shrink-0" src="assets/modrinth-mark.svg" width="32" height="32" alt="" aria-hidden="true">
            <span class="mc-layer-content">Modrinth</span>
          </a>
        </div>
        <div class="mt-6">
          <button id="expand-collapse-all" type="button" aria-expanded="false" class="mc-interactive mc-btn-press relative z-[2] inline-flex items-center gap-2.5 font-minecraft text-xl mc-text bg-block-dirt mc-border mc-hover px-5 py-2.5 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-white focus-visible:ring-offset-2 focus-visible:ring-offset-transparent">
            <svg class="mc-chevron w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            <span id="expand-collapse-label" class="mc-layer-content">Expand All</span>
          </button>
        </div>
      </section>
      <div id="features"></div>
    </main>
    <div id="the-mctooltip" class="relative z-10"></div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/accordion.js"></script>
    <script src="js/site.js"></script>
  </body>
</html>
